    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .stars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }
        .star-card {
            background: linear-gradient(145deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            border: 2px solid #ffd700;
        }
        .star-card:hover {
            transform: translateY(-10px);
        }
        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }
        .star-name {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .star-country {
            color: #ffd700;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .star-position {
            color: #aaa;
            font-size: 0.9rem;
        }
        .star-number {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ffd700;
            color: #1a1a2e;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
